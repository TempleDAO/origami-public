name: Vercel preview deploy
on:
  pull_request:
    types: [opened, labeled, synchronize]

jobs:
  vercel-deploy:
    if: contains(github.event.pull_request.labels.*.name, 'preview-deploy')
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: "deploy"
        id: deploy_step
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: "-A apps/dapp/vercel.json"
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.ORIGAMI_PROJECT_ID}}
          alias-domains: |
            pr-{{PR_NUMBER}}-preview.origami.finance
        continue-on-error: true
      - name: "deploy_storybook"
        id: deploy_storybook_step
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: "-A apps/dapp/vercel_storybook.json"
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.ORIGAMI_PROJECT_ID}}
          alias-domains: |
            pr-{{PR_NUMBER}}-storybook.origami.finance
        continue-on-error: true
      - name: "notify failure"
        if: steps.deploy_step.outcome == 'failure'
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: error
          description: Deploy to Vercel failed!
          details: "[PR Details](${{ github.event.pull_request._links.html.href }})"
          footer: PR ${{ github.event.number }}
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: "fail"
        if: steps.deploy_step.outcome == 'failure'
        run: exit 1
      - name: "notify success"
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: info
          description: (ORIGAMI) PREVIEW Deploy to Vercel succeeded!
          details: "[View Preview](${{ steps.deploy_step.outputs['preview-url'] }}) | [PR Details](${{ github.event.pull_request._links.html.href }})"
          footer: PR ${{ github.event.number }}
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
